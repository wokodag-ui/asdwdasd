<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Математический проект</title>
    <!-- Подключаем стильный шрифт Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #ffffff;
            --accent-color: #6366f1;
            --text-color: #1f2937;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Анимированный градиент на фоне */
            background: linear-gradient(-45deg, #e8f0ff, #f1e4ff, #e2f9fb, #fff0f0);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px); /* Эффект размытия стекла */
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 32px;
            padding: 50px 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        h1 {
            font-weight: 600;
            font-size: 28px;
            color: var(--text-color);
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        p {
            color: #6b7280;
            font-size: 15px;
            margin-bottom: 35px;
            font-weight: 300;
        }

        .button-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .btn {
            position: relative;
            text-decoration: none;
            color: var(--text-color);
            background: rgba(255, 255, 255, 0.8);
            padding: 18px 24px;
            border-radius: 18px;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 255, 255, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.02);
        }

        /* Эффект при наведении */
        .btn:hover {
            transform: scale(1.03);
            background: #ffffff;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.15);
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        .btn:active {
            transform: scale(0.98);
        }

        /* Иконка стрелочки справа */
        .btn::after {
            content: '→';
            position: absolute;
            right: 20px;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .btn:hover::after {
            opacity: 1;
            right: 15px;
        }

        /* Авторская подпись */
        .author-info {
            margin-top: 35px;
            padding-top: 20px;
            border-top: 1px solid rgba(0,0,0,0.05);
            font-size: 13px;
            color: #6b7280;
            line-height: 1.6;
        }

        .author-name {
            display: block;
            font-weight: 600;
            color: var(--text-color);
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <h1>Функции</h1>
        <p>Выберите график для изучения</p>
        
        <div class="button-grid">
            <a href="https://www.geogebra.org/m/pvxze75h" class="btn">Линейная функция</a>
            <a href="https://www.geogebra.org/m/vnvhvjps" class="btn">Квадратичная функция</a>
            <a href="https://www.geogebra.org/m/smu5eczg" class="btn">Обратная пропорциональность</a>
            <a href="https://www.geogebra.org/m/qarurz2s" class="btn">Степенная функция</a>
        </div>

        <div class="author-info">
            Выполнено учеником 9В класса 
            <span class="author-name">Файзрахмановым Амалем Радиковичем</span>
        </div>
    </div>

</body>
</html>
